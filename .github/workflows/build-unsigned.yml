name: Build unsigned iOS artifact

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-ios-unsigned-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select_run:
    name: Avoid duplicate branch and tag builds
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}

    steps:
      - name: Checkout branch push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select build run
        id: decision
        shell: bash
        run: |
          set -euo pipefail

          SHOULD_BUILD=true
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            MATCHING_TAG="$(git tag --points-at "${GITHUB_SHA}" --list 'v*')"
            if [[ -n "${MATCHING_TAG}" ]]; then
              SHOULD_BUILD=false
              echo "跳过已由标签构建覆盖的 main 分支提交：${MATCHING_TAG}"
            fi
          fi

          echo "should_build=${SHOULD_BUILD}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build unsigned iOS IPA
    needs: select_run
    if: needs.select_run.outputs.should_build == 'true'
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail

          XCODE_APP=""
          for candidate in /Applications/Xcode_26.5.app /Applications/Xcode_26.5.0.app /Applications/Xcode.app; do
            if [[ -d "${candidate}" ]]; then
              XCODE_APP="${candidate}"
              break
            fi
          done

          if [[ -z "${XCODE_APP}" ]]; then
            echo "找不到可用的 Xcode"
            exit 1
          fi

          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build unsigned IPA
        run: bash build_ios_unsigned.sh

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v7
        with:
          name: Hanairo-iOS-unsigned-${{ github.run_number }}
          path: build/Hanairo-iOS-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  telegram:
    name: Send IPA to Telegram channel
    needs:
      - select_run
      - build
    if: >-
      needs.select_run.outputs.should_build == 'true' &&
      needs.build.result == 'success' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download unsigned IPA
        uses: actions/download-artifact@v8
        with:
          name: Hanairo-iOS-unsigned-${{ github.run_number }}
          path: telegram-assets

      - name: Send IPA to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [[ -z "${TELEGRAM_BOT_TOKEN}" ]]; then
            echo "::error::缺少 Actions Secret：TELEGRAM_BOT_TOKEN"
            exit 1
          fi

          if [[ -z "${TELEGRAM_CHAT_ID}" ]]; then
            echo "::error::缺少 Actions Secret：TELEGRAM_CHAT_ID"
            exit 1
          fi

          IPA_PATH="telegram-assets/Hanairo-iOS-unsigned.ipa"
          if [[ ! -f "${IPA_PATH}" ]]; then
            echo "::error::找不到待发送的 IPA：${IPA_PATH}"
            exit 1
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          CAPTION="$(printf 'Hanairo iOS CI 构建完成\n\n版本：%s\nCommit：%s\n构建：#%s\n仓库：%s\n详情：%s' \
            "${REF_NAME}" \
            "${SHORT_SHA}" \
            "${RUN_NUMBER}" \
            "${REPOSITORY}" \
            "${RUN_URL}")"

          RESPONSE_FILE="${RUNNER_TEMP}/telegram-response.json"
          if ! curl \
              --fail-with-body \
              --silent \
              --show-error \
              --connect-timeout 15 \
              --max-time 600 \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              --form-string "chat_id=${TELEGRAM_CHAT_ID}" \
              --form "document=@${IPA_PATH};type=application/octet-stream" \
              --form-string "caption=${CAPTION}" \
              --output "${RESPONSE_FILE}"; then
            DESCRIPTION="$(
              python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("description", "未知错误"))' \
                "${RESPONSE_FILE}" 2>/dev/null \
                || echo "无法读取 Telegram API 错误响应"
            )"
            echo "::error::Telegram API：${DESCRIPTION}"
            exit 1
          fi

          echo "IPA 已发送到 Telegram 频道。"

  release:
    name: Create GitHub Release
    needs:
      - select_run
      - build
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download unsigned IPA
        uses: actions/download-artifact@v8
        with:
          name: Hanairo-iOS-unsigned-${{ github.run_number }}
          path: release-assets

      - name: Generate release body
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${TAG_NAME}$" | head -n 1 || true)"

          append_release_commits() {
            awk '
              !/^[[:space:]]*\[X\]/ {
                print "- " $0
                found = 1
              }
              END {
                if (!found) {
                  print "- 本次没有需要公开展示的提交记录。"
                }
              }
            '
          }

          cat > release_body.md <<EOF
          这是由 GitHub Actions 自动构建的 Hanairo iOS 发行版本。

          ## 下载说明

          - \`Hanairo-iOS-unsigned.ipa\`：iOS 未签名安装包

          ## 安装说明

          该 IPA 未签名，不能直接作为 App Store 应用安装，需要自行签名后安装。

          ## 版本信息

          - 版本：\`${TAG_NAME}\`
          - Commit：\`${GITHUB_SHA}\`
          - 构建编号：\`${GITHUB_RUN_NUMBER}\`

          ## 更新内容

          EOF

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            echo "从 \`${PREVIOUS_TAG}\` 到 \`${TAG_NAME}\` 的提交：" >> release_body.md
            echo "" >> release_body.md
            git log "${PREVIOUS_TAG}..${TAG_NAME}" --pretty=format:"%s" \
              | append_release_commits >> release_body.md
          else
            echo "最近提交：" >> release_body.md
            echo "" >> release_body.md
            git log -20 --pretty=format:"%s" \
              | append_release_commits >> release_body.md
          fi

          echo "" >> release_body.md
          echo "" >> release_body.md
          echo "---" >> release_body.md
          echo "" >> release_body.md
          echo "由 GitHub Actions 自动发布。" >> release_body.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: Hanairo ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: release-assets/Hanairo-iOS-unsigned.ipa
